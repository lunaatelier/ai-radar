name: Daily news collect

on:
  schedule:
    - cron: "0 22 * * *" # 07:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Collect and summarize
        run: node scripts/collect.mjs
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL }}

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: daily collect $(TZ=Asia/Seoul date +%F)"
            git push
          fi
